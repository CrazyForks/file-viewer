<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" width="1280" height="640" viewBox="0 0 1280 640" role="img" aria-labelledby="title desc">
  <title id="title">File Viewer social preview</title>
  <desc id="desc">File Viewer previews 208 file extensions entirely in the browser through 25 lazy pipelines, with self-hosted Worker, WASM, font, and vendor assets.</desc>
  <defs>
    <linearGradient id="page" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#e8f5fa"/>
      <stop offset="0.54" stop-color="#f6f8f7"/>
      <stop offset="1" stop-color="#e8f6ed"/>
    </linearGradient>
    <linearGradient id="fade" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#f6f8f7" stop-opacity="1"/>
      <stop offset="0.6" stop-color="#f6f8f7" stop-opacity="0.96"/>
      <stop offset="1" stop-color="#f6f8f7" stop-opacity="0"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="18" stdDeviation="24" flood-color="#23493d" flood-opacity="0.16"/>
    </filter>
    <clipPath id="workspace-clip">
      <rect x="540" y="44" width="700" height="552" rx="22"/>
    </clipPath>
  </defs>

  <rect width="1280" height="640" fill="url(#page)"/>
  <g opacity="0.38" stroke="#8aa49a" stroke-width="1">
    <path d="M0 112H1280M0 224H1280M0 336H1280M0 448H1280M0 560H1280"/>
    <path d="M112 0V640M224 0V640M336 0V640M448 0V640M560 0V640M672 0V640M784 0V640M896 0V640M1008 0V640M1120 0V640"/>
  </g>

  <g filter="url(#shadow)">
    <rect x="540" y="44" width="700" height="552" rx="22" fill="#ffffff" stroke="#dce8e3"/>
    <image x="540" y="44" width="700" height="552" preserveAspectRatio="xMidYMid slice" clip-path="url(#workspace-clip)" xlink:href="../apps/official-site/public/file-viewer-demo-v2.2.2-desktop-en.webp" href="../apps/official-site/public/file-viewer-demo-v2.2.2-desktop-en.webp"/>
  </g>
  <rect x="500" y="0" width="300" height="640" fill="url(#fade)"/>

  <image x="64" y="54" width="72" height="72" xlink:href="../apps/viewer-demo/src/assets/logo.png" href="../apps/viewer-demo/src/assets/logo.png"/>
  <text x="154" y="97" fill="#18241f" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="32" font-weight="800">File Viewer</text>
  <text x="64" y="232" fill="#18241f" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="62" font-weight="850">Preview files.</text>
  <text x="64" y="300" fill="#1c8555" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="62" font-weight="850">Keep them local.</text>
  <text x="64" y="356" fill="#50635b" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="24" font-weight="650">No conversion server. No upload step.</text>

  <g transform="translate(64 402)">
    <rect width="386" height="50" rx="10" fill="#ffffff" fill-opacity="0.78" stroke="#d7e5df"/>
    <circle cx="24" cy="25" r="6" fill="#31a66f"/>
    <text x="42" y="32" fill="#263831" font-family="SFMono-Regular, Consolas, monospace" font-size="19" font-weight="700">npm i @file-viewer/web-full</text>
  </g>

  <g font-family="Inter, Segoe UI, Arial, sans-serif" font-size="19" font-weight="760">
    <rect x="64" y="478" width="166" height="42" rx="9" fill="#ffffff" fill-opacity="0.72" stroke="#d7e5df"/>
    <text x="84" y="505" fill="#1c8555">208 extensions</text>
    <rect x="240" y="478" width="174" height="42" rx="9" fill="#ffffff" fill-opacity="0.72" stroke="#d7e5df"/>
    <text x="260" y="505" fill="#2872bd">25 pipelines</text>
  </g>

  <text x="64" y="574" fill="#5c6f67" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="20" font-weight="700">Office · PDF/OFD · CAD · Archives · Email · 3D · Code</text>
</svg>
